manual:
  title: "# BIMOS CLI Manual"
  description: "BIMOS (Biomolecular Modeling Suite) is a high-performance toolkit for structural biology, virtual screening, and quantum chemistry."
  footer: "For more information, visit the official documentation or use `bimos --help`."
  sections:
    - title: "## 1. Core Execution Rules"
      content: |
        > **IMPORTANT**: Always run BIMOS globally using the `bimos` command. 
        > Do not execute scripts from inside the `./backend` directory. Navigate to your working directory first.
        
        * **Jobs**: Every calculation (docking, prediction, etc.) is tracked as a job. Use `bimos jobs` to see them.
        * **Desktop UI**: You can start the full GUI at any time using `bimos -g` or append `-g` to any workflow command to monitor it live.
        * **CPU Optimization**: Use the `--max` flag to force the use of all available CPU cores/threads.

    - title: "## 2. Virtual Screening & Databases"
      content: |
        BIMOS provides built-in curated datasets (`candidates_1000`, `phytocompounds_300`) for virtual screening.
        
        * **Search Candidates**: `bimos db query "acid" --dataset phytocompounds_300`
        * **Export Dataset**: `bimos db export candidates_1000 ./my_ligands.sdf`
        * **Direct Screening**: `bimos dock target.pdb candidates_1000 --dataset -g`

    - title: "## 3. Protein Structure Prediction"
      content: |
        Predict 3D structures from FASTA sequences using AI-driven folding models.
        * **ESMFold**: `bimos predict sequence.fasta -o output_dir/`
        * **Boltz-1**: `bimos predict-boltz sequence.fasta -n 5`

    - title: "## 4. Molecular Docking & Simulation"
      content: |
        ### 4.1. Docking (Vina)
        Perform molecular docking using your own SDF files or built-in datasets.
        * **Example**: `bimos dock protein.pdb ligands.sdf -o results/`

        ### 4.2. MD Simulation Workflows (GROMACS)
        Automates the entire GROMACS pipeline.
        * **APO Simulation**: `bimos workflow -p protein.pdb`
        * **HOLO Simulation**: `bimos workflow -p protein.pdb --ligand-gro lig.gro --ligand-itp lig.itp`

    - title: "## 5. Quantum Mechanics (QM)"
      content: |
        Run automated charge computations and structure optimizations using host binaries.
        * **ORCA Pipeline**: `bimos qm-orca ./ligands_dir -j 4 --charge 0`
        * **Gaussian 16**: `bimos qm-g16 ./ligands_dir -j 4 --charge 1`

    - title: "## 6. Troubleshooting"
      content: |
        * **White Screen GUI**: Check `~/.bimos/.env`. If `BIMOS_REMOTE_URL` is set to an unreachable IP, the UI will stall. Comment it out for local mode.
        * **View Logs**: `bimos jobs -l <JOB_ID>`
        * **Debug Mode**: Enable verbose output with `bimos --debug <COMMAND>`
